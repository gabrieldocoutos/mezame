name: Auto Release

on:
  schedule:
    - cron: '0 11 * * 1-5' # 8am BRT (UTC-3), Monday–Friday
  workflow_dispatch: # Allow manual trigger from GitHub UI

jobs:
  auto-release:
    runs-on: ubuntu-latest
    environment: TAURI_SIGNING_PRIVATE_KEY
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Full history needed to resolve latest tag
          persist-credentials: false # Don't shadow GH_PAT with GITHUB_TOKEN extraheader

      - name: Compute next patch version
        id: version
        run: |
          LATEST=$(git tag --sort=-version:refname | grep '^v[0-9]' | head -1)
          if [ -z "$LATEST" ]; then
            LATEST="v0.0.0"
          fi
          VERSION="${LATEST#v}"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
          NEW_VERSION="${MAJOR}.${MINOR}.$((PATCH + 1))"
          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$NEW_VERSION" >> "$GITHUB_OUTPUT"

      - name: Bump version in source files
        env:
          NEW_VERSION: ${{ steps.version.outputs.version }}
        run: |
          tmp=$(mktemp)
          jq --arg v "$NEW_VERSION" '.version = $v' package.json > "$tmp" && mv "$tmp" package.json
          jq --arg v "$NEW_VERSION" '.version = $v' src-tauri/tauri.conf.json > "$tmp" && mv "$tmp" src-tauri/tauri.conf.json
          sed -i '0,/^version = ".*"/s//version = "'"$NEW_VERSION"'"/' src-tauri/Cargo.toml
          awk -v ver="$NEW_VERSION" '
            /^name = "mezame"$/ { found = 1 }
            found && /^version = "/ { sub(/"[^"]*"/, "\"" ver "\""); found = 0 }
            { print }
          ' src-tauri/Cargo.lock > "$tmp" && mv "$tmp" src-tauri/Cargo.lock

      - name: Commit bump and push tag to trigger release
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
          NEW_TAG: ${{ steps.version.outputs.tag }}
          NEW_VERSION: ${{ steps.version.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json src-tauri/tauri.conf.json src-tauri/Cargo.toml src-tauri/Cargo.lock
          git commit -m "chore(release): bump version to ${NEW_VERSION}"
          git tag "$NEW_TAG"
          REMOTE="https://x-access-token:${GH_PAT}@github.com/${{ github.repository }}.git"
          git push "$REMOTE" HEAD:${{ github.ref_name }}
          git push "$REMOTE" "$NEW_TAG"
