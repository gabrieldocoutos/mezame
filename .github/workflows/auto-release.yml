name: Auto Release

on:
  schedule:
    - cron: '0 11 * * 1-5' # 8am BRT (UTC-3), Monday–Friday
  workflow_dispatch: # Allow manual trigger from GitHub UI

jobs:
  auto-release:
    runs-on: ubuntu-latest
    environment: TAURI_SIGNING_PRIVATE_KEY
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Full history needed to resolve latest tag

      - name: Compute next patch version
        id: version
        run: |
          LATEST=$(git tag --sort=-version:refname | grep '^v[0-9]' | head -1)
          if [ -z "$LATEST" ]; then
            LATEST="v0.0.0"
          fi
          VERSION="${LATEST#v}"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
          NEW_TAG="v${MAJOR}.${MINOR}.$((PATCH + 1))"
          echo "tag=$NEW_TAG" >> "$GITHUB_OUTPUT"

      - name: Push tag to trigger release workflow
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.version.outputs.tag }}"
          git push https://x-access-token:${GH_PAT}@github.com/${{ github.repository }}.git "${{ steps.version.outputs.tag }}"
